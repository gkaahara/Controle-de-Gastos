{% extends "base.html" %}
{% block title %}Cartão de Crédito{% endblock %}
{% block content %}
<h1>Gastos de Cartão de Crédito</h1>

<details>
  <summary>Importar Fatura</summary>
  <div class="import-section">
    <div class="inline-form">
      <label>Vencimento: <input type="date" id="importVencto" required></label>
      <label>Categoria: <select id="importCat"><option value="">Categoria</option></select></label>
    </div>
    <textarea id="faturaText" rows="6" placeholder="Cole aqui o texto da fatura...&#10;Ex:&#10;14/04 Steam 02/03 27,26&#10;20/04 PANIFICADORA ALADIM LT 38,93" style="width:100%;box-sizing:border-box;margin:8px 0;padding:8px;font-family:monospace"></textarea>
    <button id="parseBtn">Parsear</button>
    <div id="previewArea" style="display:none;margin-top:12px">
      <table class="table">
        <thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Parcelas</th><th>Responsável</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
      <button id="importBtn">Importar</button>
      <span id="importMsg" style="margin-left:12px"></span>
    </div>
  </div>
</details>

<form class="inline-form" id="cartForm">
  <input type="text" id="cartDesc" placeholder="Descrição" required>
  <input type="number" step="0.01" id="cartValor" placeholder="Valor total" required>
  <select id="cartCat" required><option value="">Categoria</option></select>
  <input type="text" id="cartBandeira" placeholder="Bandeira" required>
  <select id="cartResp" required><option value="Casal">Casal</option><option value="Gabriel">Gabriel</option><option value="Helena">Helena</option></select>
  <input type="number" id="cartParcelas" placeholder="Total parcelas" min="1" value="1" required>
  <input type="date" id="cartVencto" required>
  <button type="submit">Adicionar</button>
</form>
<table class="table" id="cartTable">
  <thead><tr><th>Descrição</th><th>Valor</th><th>Categoria</th><th>Bandeira</th><th>Responsável</th><th>Parcelas</th><th>Vencto</th><th>Ações</th></tr></thead>
  <tbody></tbody>
</table>
<script>
document.getElementById('cartVencto').valueAsDate = new Date();
document.getElementById('importVencto').valueAsDate = new Date();
async function carregarCategorias() {
  const r = await fetch('/categorias');
  const cats = await r.json();
  const html = '<option value="">Categoria</option>' + cats.map(c => `<option value="${esc(c.id)}">${esc(c.nome)}</option>`).join('');
  document.getElementById('cartCat').innerHTML = html;
  document.getElementById('importCat').innerHTML = html;
}
async function carregar() {
  const r = await fetch('/cartoes');
  const dados = await r.json();
  const cats = await (await fetch('/categorias')).json();
  const catMap = Object.fromEntries(cats.map(c => [c.id, c.nome]));
  const tbody = document.querySelector('#cartTable tbody');
  tbody.innerHTML = dados.map(c => `
    <tr data-id="${esc(c.id)}">
      <td class="desc-cell">${esc(c.descricao||'')}</td>
      <td>R$ ${(c.valor||0).toFixed(2)}</td>
      <td>${esc(catMap[c.categoriaId]||'')}</td>
      <td>${esc(c.bandeira||'')}</td>
      <td>${esc(c.responsavel||'Casal')}</td>
      <td>${c.parcelaAtual||1}/${c.totalParcelas||1}</td>
      <td>${esc(c.vencimento||'')}</td>
      <td class="acoes-cell"><button data-id="${esc(c.id)}" class="btn-excluir-cart">Excluir</button> <button class="btn-editar" data-id="${esc(c.id)}">Editar</button></td>
    </tr>
  `).join('');
}
document.querySelector('#cartTable tbody').addEventListener('click', e => {
    if (e.target.classList.contains('btn-excluir-cart')) {
        deletar(e.target.dataset.id);
    } else if (e.target.classList.contains('btn-editar')) {
        editar(e.target);
    }
});
document.getElementById('cartForm').addEventListener('submit', async e => {
  e.preventDefault();
  const totalParcelas = parseInt(document.getElementById('cartParcelas').value);
  const valor = parseFloat(document.getElementById('cartValor').value);
  const body = {
    descricao: document.getElementById('cartDesc').value.trim(),
    valor: valor,
    categoriaId: document.getElementById('cartCat').value,
    bandeira: document.getElementById('cartBandeira').value.trim(),
    responsavel: document.getElementById('cartResp').value,
    parcelaAtual: 1,
    totalParcelas: totalParcelas,
    vencimento: document.getElementById('cartVencto').value,
  };
  if (!body.descricao || !body.valor || !body.categoriaId || !body.bandeira) return;
  await fetch('/cartoes', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  document.getElementById('cartDesc').value = '';
  document.getElementById('cartValor').value = '';
  carregar();
});
async function deletar(id) {
  if (!confirm('Excluir gasto de cartão?')) return;
  await fetch(`/cartoes/${id}`, { method:'DELETE' });
  carregar();
}
function editar(btn) {
  const row = btn.closest('tr');
  const descCell = row.querySelector('.desc-cell');
  if (descCell.querySelector('input')) return;
  const original = descCell.textContent;
  const encoded = original.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  descCell.innerHTML = `<input type="text" class="edit-input" value="${encoded}" data-original="${encoded}">`;
  btn.textContent = 'Salvar';
  btn.className = 'btn-salvar';
  btn.onclick = () => salvar(btn);
  const input = descCell.querySelector('input');
  input.focus();
  input.select();
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); salvar(btn); }
    if (e.key === 'Escape') { e.preventDefault(); cancelar(btn); }
  });
}
async function salvar(btn) {
  const row = btn.closest('tr');
  const id = row.dataset.id;
  const input = row.querySelector('.edit-input');
  if (!input) return;
  const novo = input.value.trim();
  if (!novo) { cancelar(btn); return; }
  const original = input.dataset.original;
  btn.disabled = true;
  btn.textContent = 'Salvando...';
  try {
    const r = await fetch(`/cartoes/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ descricao: novo })
    });
    if (!r.ok) throw new Error(await r.text());
    input.closest('td').textContent = novo;
    restaurarBotao(btn);
  } catch(e) {
    input.closest('td').textContent = original;
    restaurarBotao(btn);
    alert('Erro ao salvar: ' + e.message);
  }
}
function cancelar(btn) {
  const row = btn.closest('tr');
  const input = row.querySelector('.edit-input');
  if (!input) return;
  input.closest('td').textContent = input.dataset.original;
  restaurarBotao(btn);
}
function restaurarBotao(btn) {
  btn.textContent = 'Editar';
  btn.className = 'btn-editar';
  btn.onclick = () => editar(btn);
  btn.disabled = false;
}
document.getElementById('parseBtn').addEventListener('click', async () => {
  const text = document.getElementById('faturaText').value.trim();
  if (!text) return;
  const resp = await fetch('/cartoes/parse', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text})
  });
  const itens = await resp.json();
  const tbody = document.getElementById('previewBody');
  tbody.innerHTML = itens.map((item, i) => `
    <tr>
      <td>${esc(item.dataCompra||'')}</td>
      <td>${esc(item.descricao)}</td>
      <td>R$ ${item.valor.toFixed(2)}</td>
      <td>${item.parcelaAtual||1}/${item.totalParcelas||1}</td>
      <td>
        <select class="resp-select" data-index="${i}">
          <option value="Gabriel">Gabriel</option>
          <option value="Helena">Helena</option>
          <option value="Ambos" selected>Ambos</option>
        </select>
      </td>
    </tr>
  `).join('');
  document.getElementById('previewArea').style.display = 'block';
});
document.getElementById('importBtn').addEventListener('click', async () => {
  const itens = Array.from(document.querySelectorAll('#previewBody tr')).map(tr => {
    const tds = tr.querySelectorAll('td');
    const sel = tr.querySelector('.resp-select');
    const parcelaMatch = tds[3].textContent.match(/(\d+)\/(\d+)/);
    return {
      descricao: tds[1].textContent,
      valor: parseFloat(tds[2].textContent.replace('R$ ','').replace(',','.')),
      dataCompra: tds[0].textContent,
      parcelaAtual: parcelaMatch ? parseInt(parcelaMatch[1]) : 1,
      totalParcelas: parcelaMatch ? parseInt(parcelaMatch[2]) : 1,
      responsavel: sel.value,
    };
  });
  const resp = await fetch('/cartoes/import', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
      itens,
      bandeira: 'Elo',
      vencimento: document.getElementById('importVencto').value,
      categoriaId: document.getElementById('importCat').value,
    })
  });
  if (resp.ok) {
    document.getElementById('importMsg').textContent = `${itens.length} itens importados!`;
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('faturaText').value = '';
    carregar();
  }
});
carregarCategorias();
carregar();
</script>
{% endblock %}
