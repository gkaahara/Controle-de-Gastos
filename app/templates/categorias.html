{% extends "base.html" %}
{% block title %}Categorias{% endblock %}
{% block content %}
<h1>Categorias</h1>
<form class="inline-form" id="catForm">
    <input type="text" id="catNome" placeholder="Nome da categoria" required>
    <input type="color" id="catCor" value="#6c757d">
    <button type="submit">Adicionar</button>
</form>
<table class="table" id="catTable">
    <thead><tr><th>Cor</th><th>Nome</th><th>Ações</th></tr></thead>
    <tbody></tbody>
</table>
<script>
async function carregar() {
    const r = await fetch('/categorias');
    const dados = await r.json();
    const tbody = document.querySelector('#catTable tbody');
    tbody.innerHTML = dados.map(c => `
        <tr>
            <td><span class="color-badge" style="background:${c.cor||'#ccc'}"></span></td>
            <td>${c.nome}</td>
            <td>
                <button onclick="deletar('${c.id}')">Excluir</button>
            </td>
        </tr>
    `).join('');
}
document.getElementById('catForm').addEventListener('submit', async e => {
    e.preventDefault();
    const nome = document.getElementById('catNome').value.trim();
    const cor = document.getElementById('catCor').value;
    if (!nome) return;
    await fetch('/categorias', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nome,cor}) });
    document.getElementById('catNome').value = '';
    carregar();
});
async function deletar(id) {
    if (!confirm('Excluir categoria?')) return;
    await fetch(`/categorias/${id}/delete`, { method:'POST' });
    carregar();
}
carregar();
</script>
{% endblock %}
